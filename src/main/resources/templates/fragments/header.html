<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">懋懋电影</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script th:src="@{/js/animations.js}" defer></script>
</head>
<body>
<header th:fragment="header">
    <nav class="navbar-ed">
        <div class="nav-inner">
            <a class="nav-brand" th:href="@{/}">懋懋<span>电影</span></a>
            <ul class="nav-links">
                <li><a th:classappend="${#httpServletRequest.requestURI == '/' ? 'active' : ''}" th:href="@{/}">首页</a></li>
                <li><a th:href="@{/rank/hot}">热播排行</a></li>
                <li><a th:href="@{/rank/top}">高分排行</a></li>
                <li><a th:href="@{/charts}">电影数据</a></li>
                <li><a th:href="@{/(isVip=1)}">VIP电影</a></li>
                <li><a th:href="@{/(free=1)}">免费电影</a></li>
                <li><a th:href="@{/chat}"><i class="bi bi-robot me-1"></i>AI助手</a></li>
            </ul>
            <div class="nav-right">
                <form th:action="@{/}" method="get" style="display:flex;gap:8px;align-items:center;">
                    <input type="hidden" name="type" th:value="${queryType}">
                    <input type="hidden" name="region" th:value="${queryRegion}">
                    <input type="hidden" name="sort" th:value="${querySort}">
                    <input class="nav-search" type="search" name="keyword" placeholder="搜索电影..." th:value="${queryKeyword}">
                </form>
                <div th:if="${session.user} == null" style="display:flex;gap:8px;">
                    <a th:href="@{/login}" class="btn-ghost" style="padding:8px 16px;font-size:13px;">登录</a>
                    <a th:href="@{/register}" class="btn-primary" style="padding:8px 16px;font-size:13px;">注册</a>
                </div>
                <div th:if="${session.user} != null" class="dropdown">
                    <div class="nav-avatar" data-bs-toggle="dropdown" style="cursor:pointer;">
                        <i class="bi bi-person-fill"></i>
                    </div>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" th:href="@{/profile}"><i class="bi bi-person me-2"></i>个人中心</a></li>
                        <li><a class="dropdown-item" th:href="@{/favorites}"><i class="bi bi-heart me-2"></i>我的收藏</a></li>
                        <li><a class="dropdown-item" th:href="@{/vip/manage}"><i class="bi bi-gem me-2"></i>会员管理</a></li>
                        <li><a class="dropdown-item" th:href="@{/vip/upgrade}"><i class="bi bi-arrow-up-circle me-2"></i>升级VIP</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" th:href="@{/logout}"><i class="bi bi-box-arrow-right me-2"></i>退出登录</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>
</header>
</body>
</html>
