<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="fragments/header :: head('注册')">
</head>
<body>
<!-- 头部导航 -->
<header th:fragment="simpleHeader">
  <nav class="navbar-ed">
    <div class="nav-inner">
      <a class="nav-brand" th:href="@{/}">懋懋<span>电影</span></a>
    </div>
  </nav>
</header>

<!-- 注册表单 -->
<section class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card-ed" style="padding: 40px 36px;">
        <h4 class="mb-4" style="font-family: var(--font-display); font-weight: 700; color: var(--text-primary);">用户注册</h4>
        <form id="registerForm">
          <div id="registerError" class="alert alert-danger" style="display:none;"></div>

          <div class="form-group">
            <label for="regUsername" class="form-label">用户名</label>
            <input type="text" class="form-input" id="regUsername" name="username" required>
          </div>

          <div class="form-group">
            <label for="regPassword" class="form-label">密码</label>
            <input type="password" class="form-input" id="regPassword" name="password" required>
          </div>

          <div class="form-group">
            <label for="regEmail" class="form-label">邮箱</label>
            <input type="email" class="form-input" id="regEmail" name="email" required>
          </div>

          <div class="form-group">
            <label for="regPhone" class="form-label">手机号</label>
            <input type="text" class="form-input" id="regPhone" name="phone" placeholder="请输入11位手机号" required>
          </div>

          <button type="submit" class="btn-primary w-100" style="justify-content: center; padding: 14px 28px;">注册</button>

          <div class="text-center mt-4">
            <p style="font-size:14px; color: var(--text-secondary);">已有账号? <a th:href="@{/login}" style="color: var(--accent); text-decoration: none; font-weight: 600;">立即登录</a></p>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>

<!-- 底部 -->
<div th:replace="fragments/footer :: footer"></div>

<!-- 脚本 -->
<script>
  document.getElementById('registerForm').addEventListener('submit', function(event) {
    event.preventDefault();

    const username = document.getElementById('regUsername').value.trim();
    const password = document.getElementById('regPassword').value;
    const email = document.getElementById('regEmail').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const errorDiv = document.getElementById('registerError');

    // 前端校验
    if (!username) { showError('请输入用户名'); return; }
    if (password.length < 3) { showError('密码长度不能少于3位'); return; }
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('请输入正确的邮箱格式'); return; }
    if (!phone || !/^1[3-9]\d{9}$/.test(phone)) { showError('请输入正确的手机号（11位数字）'); return; }

    fetch('/api/user/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, email, phone })
    })
    .then(response => response.json())
    .then(data => {
      if (data.success) {
        window.location.href = '/login';
      } else {
        showError(data.msg || '注册失败');
      }
    })
    .catch(() => showError('网络错误，请重试'));

    function showError(msg) {
      errorDiv.textContent = msg;
      errorDiv.style.display = 'block';
    }
  });
</script>
</body>
</html>
