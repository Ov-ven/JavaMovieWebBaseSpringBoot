<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="fragments/header :: head('登录')">
</head>
<body>
<!-- 头部导航 -->
<header th:fragment="simpleHeader">
  <nav class="navbar-ed">
    <div class="nav-inner">
      <a class="nav-brand" th:href="@{/}">懋懋<span>电影</span></a>
    </div>
  </nav>
</header>
<!-- 登录表单 -->
<section class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card-ed" style="padding: 40px 36px;">
        <h4 class="mb-4" style="font-family: var(--font-display); font-weight: 700; color: var(--text-primary);">用户登录</h4>
        <form id="loginForm">
          <div id="loginError" class="alert alert-danger" style="display:none;"></div>

          <div class="form-group">
            <label for="username" class="form-label">用户名</label>
            <input type="text" class="form-input" id="username" name="username" required>
          </div>

          <div class="form-group">
            <label for="password" class="form-label">密码</label>
            <input type="password" class="form-input" id="password" name="password" required>
          </div>

          <div class="mb-3">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="remember" name="remember">
              <label class="form-check-label" for="remember" style="font-size:14px; color: var(--text-secondary);">记住我</label>
            </div>
          </div>

          <button type="submit" class="btn-primary w-100" style="justify-content: center; padding: 14px 28px;">登录</button>

          <div class="text-center mt-4">
            <p style="font-size:14px; color: var(--text-secondary);">还没有账号? <a th:href="@{/register}" style="color: var(--accent); text-decoration: none; font-weight: 600;">立即注册</a></p>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>

<!-- 底部 -->
<div th:replace="fragments/footer :: footer"></div>

<!-- 脚本 -->
<script>
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const loginData = {
      username: document.getElementById('username').value,
      password: document.getElementById('password').value
    };

    fetch('/api/user/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(loginData)
    })
            .then(response => response.json())
            .then(data => {
              const errorDiv = document.getElementById('loginError');

              if (data.success) {
                errorDiv.style.display = 'none';
                window.location.href = '/';
              } else {
                errorDiv.textContent = data.msg || '登录失败';
                errorDiv.style.display = 'block';
              }
            })
            .catch(error => {
              console.error('登录请求失败:', error);
              document.getElementById('loginError').textContent = '登录请求失败，请重试';
              document.getElementById('loginError').style.display = 'block';
            });
  });

  // GSAP 表单入场动画
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof gsap === 'undefined') return;
    var card = document.querySelector('.card-ed');
    if (card) {
      gsap.from(card, {
        opacity: 0,
        y: 30,
        scale: 0.97,
        duration: 0.6,
        ease: 'power2.out'
      });
    }
  });
</script>
</body>
</html>
