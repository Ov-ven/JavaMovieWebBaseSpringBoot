<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments/header :: head('首页')}">
</head>
<body>
<!-- 头部导航 -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container" style="padding-top: 16px;">
	<div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
		<p th:text="${success}" class="mb-0"></p>
		<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
	</div>
	<div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
		<p th:text="${error}" class="mb-0"></p>
		<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
	</div>
</div>

<!-- 轮播图 - 热播电影 -->
<section class="section" style="padding-top: 0;">
	<div class="container">
		<div id="hotCarousel" class="carousel slide" data-bs-ride="carousel">
			<div class="carousel-inner" style="border-radius: var(--radius-lg); overflow: hidden;">
				<div th:each="movie, iter : ${hotMovies}"
					 th:class="${iter.index == 0} ? 'carousel-item active' : 'carousel-item'">
					<div th:style="'background-image: url(\'/image/' + ${movie.cover} + '\'); height: 460px; background-size: cover; background-position: center; position: relative;'">
						<div class="d-none d-md-block position-absolute bottom-0 start-0 w-100"
							 style="background: linear-gradient(transparent, rgba(0,0,0,0.7)); padding: 40px 32px;">
							<h2 th:text="${movie.title}"
								style="color: #fff; font-family: var(--font-display); font-size: 2rem; font-weight: 700; margin-bottom: 8px;">电影标题</h2>
							<p th:text="${movie.description}"
							   style="color: rgba(255,255,255,0.85); font-size: 14px; max-width: 600px; margin-bottom: 16px;">电影描述</p>
							<a th:href="@{/detail/{id}(id=${movie.id})}" class="btn-primary">查看详情</a>
						</div>
					</div>
				</div>
			</div>
			<!-- 轮播控件 -->
			<button class="carousel-control-prev" type="button" data-bs-target="#hotCarousel" data-bs-slide="prev">
				<span class="carousel-control-prev-icon" aria-hidden="true"></span>
				<span class="visually-hidden">Previous</span>
			</button>
			<button class="carousel-control-next" type="button" data-bs-target="#hotCarousel" data-bs-slide="next">
				<span class="carousel-control-next-icon" aria-hidden="true"></span>
				<span class="visually-hidden">Next</span>
			</button>
		</div>
	</div>
</section>

<!-- 排行榜 -->
<section class="section" style="padding-top: 0;">
	<div class="container">
		<div class="section-header">
			<h2 class="section-title">电影排行榜</h2>
			<a th:href="@{/rank/hot}" class="section-link">查看更多 &rarr;</a>
		</div>
		<div class="row g-4">
			<!-- 本周热播 -->
			<div class="col-md-4">
				<div class="card-ed" style="overflow: hidden;">
					<div style="padding: 16px 20px; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; gap: 8px;">
						<i class="bi bi-trophy" style="color: var(--accent);"></i>
						<span style="font-weight: 600; font-size: 15px;">本周热播</span>
					</div>
					<ul style="list-style: none; padding: 0; margin: 0;">
						<li th:each="movie, iter : ${weeklyTop}"
							style="padding: 12px 20px; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; gap: 12px;">
							<span th:text="${iter.index+1}"
								  style="width: 24px; height: 24px; border-radius: 50%; background: var(--accent-light); color: var(--accent); display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0;"></span>
							<a th:href="@{/detail/{id}(id=${movie.id})}" th:text="${movie.title}"
							   style="flex: 1; color: var(--text-primary); text-decoration: none; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></a>
							<span th:text="${movie.views} + ' 播放'"
								  style="color: var(--text-muted); font-size: 12px; flex-shrink: 0;"></span>
						</li>
					</ul>
				</div>
			</div>
			<!-- 好评排行 -->
			<div class="col-md-4">
				<div class="card-ed" style="overflow: hidden;">
					<div style="padding: 16px 20px; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; gap: 8px;">
						<i class="bi bi-star" style="color: #fbbf24;"></i>
						<span style="font-weight: 600; font-size: 15px;">好评排行</span>
					</div>
					<ul style="list-style: none; padding: 0; margin: 0;">
						<li th:each="movie, iter : ${topScoreMovies}"
							style="padding: 12px 20px; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; gap: 12px;">
							<span th:text="${iter.index+1}"
								  style="width: 24px; height: 24px; border-radius: 50%; background: var(--accent-light); color: var(--accent); display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0;"></span>
							<a th:href="@{/detail/{id}(id=${movie.id})}" th:text="${movie.title}"
							   style="flex: 1; color: var(--text-primary); text-decoration: none; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></a>
							<span th:text="${movie.score} + ' 分'"
								  style="color: var(--accent); font-size: 12px; font-weight: 600; flex-shrink: 0;"></span>
						</li>
					</ul>
				</div>
			</div>
			<!-- 新片推荐 -->
			<div class="col-md-4">
				<div class="card-ed" style="overflow: hidden;">
					<div style="padding: 16px 20px; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; gap: 8px;">
						<i class="bi bi-film" style="color: var(--text-secondary);"></i>
						<span style="font-weight: 600; font-size: 15px;">新片推荐</span>
					</div>
					<ul style="list-style: none; padding: 0; margin: 0;">
						<li th:each="movie, iter : ${newMovies}"
							style="padding: 12px 20px; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; gap: 12px;">
							<span th:text="${iter.index+1}"
								  style="width: 24px; height: 24px; border-radius: 50%; background: var(--accent-light); color: var(--accent); display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0;"></span>
							<a th:href="@{/detail/{id}(id=${movie.id})}" th:text="${movie.title}"
							   style="flex: 1; color: var(--text-primary); text-decoration: none; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></a>
							<span th:text="${#dates.format(movie.releaseDate, 'yyyy-MM-dd')}"
								  style="color: var(--text-muted); font-size: 12px; flex-shrink: 0;"></span>
						</li>
					</ul>
				</div>
			</div>
		</div>
	</div>
</section>

<!-- 电影列表 -->
<section class="section" style="padding-top: 0;">
	<div class="container">
		<div class="section-header">
			<h2 class="section-title">电影列表</h2>
		</div>
		<div class="filter-bar">
			<div class="filter-pills">
				<a th:href="@{/(sort='new')}" th:classappend="${querySort == 'new'} ? 'active' : ''" class="pill">最新</a>
				<a th:href="@{/(sort='hot')}" th:classappend="${querySort == 'hot'} ? 'active' : ''" class="pill">最热</a>
				<a th:href="@{/(sort='top')}" th:classappend="${querySort == 'top'} ? 'active' : ''" class="pill">评分最高</a>
			</div>
		</div>

		<div class="row g-4">
			<div th:each="movie : ${moviePage.records}" class="col-md-3">
				<a th:href="@{/detail/{id}(id=${movie.id})}" style="text-decoration: none; color: inherit; display: block;">
					<div class="movie-card">
						<div class="movie-cover-wrap">
							<img class="movie-cover" th:src="@{'/image/'+${movie.cover}}" alt="电影封面">
							<span th:if="${movie.isVip == 1}" class="movie-badge badge-vip">VIP</span>
							<span th:if="${movie.price != null and movie.price > 0}" class="movie-badge badge-price"
								  th:text="'¥' + ${#numbers.formatDecimal(movie.price, 1, 2)}"></span>
							<div th:if="${movie.score != null}" class="movie-score">
								<i class="bi bi-star-fill"></i>
								<span th:text="${#numbers.formatDecimal(movie.score, 1, 1)}"></span>
							</div>
						</div>
						<div class="movie-info">
							<div class="movie-title" th:text="${movie.title}">电影标题</div>
							<div class="movie-meta" th:text="${movie.description}">电影描述</div>
						</div>
					</div>
				</a>
			</div>
		</div>

		<!-- 分页控件 -->
		<nav th:if="${moviePage.pages > 1}" style="margin-top: 40px;">
			<style>
				.pagination .page-item .page-link {
					border: 1px solid var(--border);
					color: var(--text-secondary);
					border-radius: var(--radius-sm);
					padding: 8px 14px;
					font-size: 14px;
					transition: all 0.2s;
				}
				.pagination .page-item .page-link:hover {
					color: var(--accent);
					border-color: var(--accent);
					background: var(--accent-light);
				}
				.pagination .page-item.active .page-link {
					background: var(--accent);
					border-color: var(--accent);
					color: #fff;
				}
				.pagination .page-item.disabled .page-link {
					color: var(--text-muted);
					border-color: var(--border-subtle);
				}
			</style>
			<ul class="pagination justify-content-center" style="gap: 4px;">
				<li class="page-item" th:classappend="${currentPage == 1} ? 'disabled' : ''">
					<a class="page-link"
					   th:href="@{/(page=1, type=${queryType}, region=${queryRegion}, keyword=${queryKeyword}, sort=${querySort})}">
						首页
					</a>
				</li>
				<li class="page-item" th:classappend="${currentPage == 1} ? 'disabled' : ''">
					<a class="page-link"
					   th:href="@{/(page=${prevPage}, type=${queryType}, region=${queryRegion}, keyword=${queryKeyword}, sort=${querySort})}">
						上一页
					</a>
				</li>

				<!-- 页码列表 -->
				<li th:each="pageNum : ${#numbers.sequence(1, moviePage.pages)}"
					th:classappend="${pageNum == currentPage} ? 'active' : ''" class="page-item">
					<a class="page-link"
					   th:href="@{/(page=${pageNum}, type=${queryType}, region=${queryRegion}, keyword=${queryKeyword}, sort=${querySort})}"
					   th:text="${pageNum}"></a>
				</li>

				<li class="page-item" th:classappend="${currentPage == moviePage.pages} ? 'disabled' : ''">
					<a class="page-link"
					   th:href="@{/(page=${nextPage}, type=${queryType}, region=${queryRegion}, keyword=${queryKeyword}, sort=${querySort})}">
						下一页
					</a>
				</li>
				<li class="page-item" th:classappend="${currentPage == moviePage.pages} ? 'disabled' : ''">
					<a class="page-link"
					   th:href="@{/(page=${moviePage.pages}, type=${queryType}, region=${queryRegion}, keyword=${queryKeyword}, sort=${querySort})}">
						尾页
					</a>
				</li>
			</ul>
		</nav>
	</div>
</section>

<!-- 底部 -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- 脚本 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  if (typeof gsap === 'undefined') return;

  // 轮播图 GSAP 动画
  const carousel = document.getElementById('hotCarousel');
  if (carousel) {
    carousel.addEventListener('slid.bs.carousel', function() {
      const activeItem = carousel.querySelector('.carousel-item.active');
      if (!activeItem) return;

      const content = activeItem.querySelector('[style*="padding"]');
      if (content) {
        gsap.fromTo(content,
          { opacity: 0, y: 25 },
          { opacity: 1, y: 0, duration: 0.6, ease: 'power2.out' }
        );
      }
    });

    // 首次加载动画
    const firstActive = carousel.querySelector('.carousel-item.active [style*="padding"]');
    if (firstActive) {
      gsap.fromTo(firstActive,
        { opacity: 0, y: 25 },
        { opacity: 1, y: 0, duration: 0.8, delay: 0.3, ease: 'power2.out' }
      );
    }
  }
});
</script>
</body>
</html>
