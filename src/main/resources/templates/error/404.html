<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="fragments/header :: head('页面未找到 - 懋懋电影')"></th:block>
  <style>
    .error-wrap {
      min-height: calc(100vh - 180px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    /* ========== 404 数字 ========== */
    .error-code {
      font-family: var(--font-display);
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      color: var(--text-primary);
      position: relative;
      display: inline-block;
      margin-bottom: 16px;
    }
    .error-code .digit {
      display: inline-block;
      position: relative;
    }
    /* 中间的 0 用强调色 */
    .error-code .digit:nth-child(2) {
      color: var(--accent);
    }

    /* ========== 胶片装饰 ========== */
    .film-strip {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 280px;
      height: 280px;
      pointer-events: none;
      opacity: 0.06;
    }
    .film-strip svg {
      width: 100%;
      height: 100%;
    }

    /* ========== 文字 ========== */
    .error-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-primary);
    }
    .error-desc {
      color: var(--text-secondary);
      font-size: 15px;
      max-width: 420px;
      margin: 0 auto 32px;
      line-height: 1.7;
    }

    /* ========== 按钮 ========== */
    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 24px;
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 500;
      font-family: var(--font-body);
      text-decoration: none;
      transition: all 0.25s;
      cursor: pointer;
      border: none;
    }
    .btn-back-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-back-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(192, 57, 43, 0.2);
      color: #fff;
    }
    .btn-back-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-back-ghost:hover {
      border-color: var(--text-secondary);
      color: var(--text-primary);
      transform: translateY(-1px);
    }

    /* ========== 搜索建议 ========== */
    .error-suggest {
      margin-top: 40px;
      padding-top: 32px;
      border-top: 1px solid var(--border-subtle);
    }
    .error-suggest p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .suggest-links {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .suggest-links a {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all 0.2s;
    }
    .suggest-links a:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    @media (max-width: 768px) {
      .error-code { font-size: 5rem; }
      .film-strip { width: 180px; height: 180px; }
      .error-title { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="error-wrap">
  <div class="error-content">

    <!-- 胶片装饰 -->
    <div class="film-strip">
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="40" y="10" width="120" height="180" rx="8" stroke="currentColor" stroke-width="4"/>
        <rect x="52" y="22" width="24" height="18" rx="3" stroke="currentColor" stroke-width="3"/>
        <rect x="88" y="22" width="24" height="18" rx="3" stroke="currentColor" stroke-width="3"/>
        <rect x="124" y="22" width="24" height="18" rx="3" stroke="currentColor" stroke-width="3"/>
        <rect x="52" y="160" width="24" height="18" rx="3" stroke="currentColor" stroke-width="3"/>
        <rect x="88" y="160" width="24" height="18" rx="3" stroke="currentColor" stroke-width="3"/>
        <rect x="124" y="160" width="24" height="18" rx="3" stroke="currentColor" stroke-width="3"/>
        <rect x="52" y="52" width="96" height="96" rx="6" stroke="currentColor" stroke-width="3"/>
        <circle cx="100" cy="100" r="28" stroke="currentColor" stroke-width="3"/>
        <circle cx="100" cy="100" r="10" fill="currentColor" opacity="0.3"/>
        <line x1="40" y1="48" x2="160" y2="48" stroke="currentColor" stroke-width="2" opacity="0.3"/>
        <line x1="40" y1="152" x2="160" y2="152" stroke="currentColor" stroke-width="2" opacity="0.3"/>
      </svg>
    </div>

    <!-- 404 数字 -->
    <div class="error-code" id="errorCode">
      <span class="digit">4</span><span class="digit">0</span><span class="digit">4</span>
    </div>

    <!-- 文字 -->
    <div class="error-title" id="errorTitle">页面走丢了</div>
    <div class="error-desc" id="errorDesc">
      你要找的页面可能已被删除、改名，或者暂时不可用。
    </div>

    <!-- 按钮 -->
    <div class="error-actions" id="errorActions">
      <a th:href="@{/}" class="btn-back btn-back-primary">
        <i class="bi bi-house-door"></i> 回到首页
      </a>
      <button class="btn-back btn-back-ghost" onclick="history.back()">
        <i class="bi bi-arrow-left"></i> 返回上页
      </button>
    </div>

    <!-- 推荐链接 -->
    <div class="error-suggest" id="errorSuggest">
      <p>或者试试这些页面</p>
      <div class="suggest-links">
        <a th:href="@{/rank/hot}"><i class="bi bi-fire me-1"></i>热播排行</a>
        <a th:href="@{/rank/top}"><i class="bi bi-star me-1"></i>高分排行</a>
        <a th:href="@{/charts}"><i class="bi bi-bar-chart me-1"></i>电影数据</a>
        <a th:href="@{/chat}"><i class="bi bi-robot me-1"></i>AI助手</a>
      </div>
    </div>

  </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof gsap === 'undefined') return;

    // 数字入场：逐个故障弹入
    var digits = document.querySelectorAll('.digit');
    gsap.from(digits, {
      y: -40,
      opacity: 0,
      scale: 1.3,
      filter: 'blur(6px)',
      duration: 0.5,
      stagger: 0.1,
      ease: 'back.out(1.7)',
      onComplete: function() {
        // 故障闪烁
        digits.forEach(function(d, i) {
          gsap.fromTo(d, {
            textShadow: '-2px 0 rgba(255,0,64,0.4), 2px 0 rgba(0,255,234,0.4)',
          }, {
            textShadow: 'none',
            duration: 0.15,
            delay: 0.3 + i * 0.05,
            ease: 'power2.out',
          });
        });
      }
    });

    // 标题 + 描述
    gsap.from('#errorTitle', { y: 15, opacity: 0, duration: 0.4, delay: 0.5, ease: 'power2.out' });
    gsap.from('#errorDesc', { y: 15, opacity: 0, duration: 0.4, delay: 0.6, ease: 'power2.out' });

    // 按钮
    gsap.from('#errorActions', { y: 15, opacity: 0, duration: 0.4, delay: 0.7, ease: 'power2.out' });

    // 推荐链接
    gsap.from('#errorSuggest', { y: 15, opacity: 0, duration: 0.4, delay: 0.8, ease: 'power2.out' });

    // 胶片装饰旋转
    gsap.to('.film-strip', {
      rotation: 360,
      duration: 60,
      repeat: -1,
      ease: 'none',
    });

    // 中间数字呼吸
    gsap.to('.digit:nth-child(2)', {
      scale: 1.05,
      duration: 2,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
    });
  });
</script>
</body>
</html>
