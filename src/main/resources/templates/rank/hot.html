<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('热播排行榜')}">
</head>
<body>
<!-- 头部导航 -->
<div th:replace="~{fragments/header :: header}"></div>

<section class="section">
	<div class="container">
		<div class="section-header">
			<h2 class="section-title"><i class="bi bi-fire" style="color: var(--accent);"></i> 热播排行榜</h2>
		</div>

		<div class="row g-4">
			<!-- TOP 3 -->
			<div class="col-md-4">
				<div class="card-ed" style="overflow: hidden;">
					<div style="padding: 16px 20px; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; gap: 8px;">
						<i class="bi bi-trophy" style="color: var(--accent);"></i>
						<span style="font-weight: 600; font-size: 15px;">TOP 3</span>
					</div>
					<div th:each="movie, iter : ${hotMovies}" th:if="${iter.index < 3}"
						 class="rank-item"
						 style="padding: 16px 20px; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; gap: 14px;">
						<span th:text="${iter.index + 1}"
							  style="width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0;"></span>
						<div style="flex: 1; min-width: 0;">
							<a th:href="@{/detail/{id}(id=${movie.id})}" th:text="${movie.title}"
							   style="display: block; font-weight: 600; font-size: 14px; color: var(--text-primary); text-decoration: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></a>
							<small style="color: var(--text-muted); font-size: 12px;">
								<span th:text="${movie.region}"></span> · <span th:text="${movie.type}"></span>
							</small>
						</div>
						<div style="flex-shrink: 0; display: flex; align-items: center; gap: 4px; color: var(--text-muted); font-size: 13px;">
							<i class="bi bi-eye-fill" style="color: var(--accent);"></i>
							<span th:text="${#numbers.formatDecimal(movie.views, 0, 'COMMA', 0, 'POINT')}"></span>
						</div>
					</div>
				</div>
			</div>

			<!-- 完整列表 -->
			<div class="col-md-8">
				<div class="card-ed" style="overflow: hidden;">
					<div style="padding: 16px 20px; border-bottom: 1px solid var(--border-subtle);">
						<span style="font-weight: 600; font-size: 15px;">完整热播排行</span>
					</div>
					<style>
						.rank-table tbody tr { transition: background 0.2s; }
						.rank-table tbody tr:hover { background: var(--accent-light); }
						.rank-item { transition: background 0.2s; }
						.rank-item:hover { background: var(--accent-light); }
					</style>
					<div style="overflow-x: auto;">
						<table class="table rank-table" style="margin: 0;">
							<thead>
							<tr style="background: var(--bg-primary);">
								<th style="width: 10%; padding: 12px 16px; font-size: 13px; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border-subtle);">排名</th>
								<th style="width: 25%; padding: 12px 16px; font-size: 13px; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border-subtle);">电影</th>
								<th style="width: 20%; padding: 12px 16px; font-size: 13px; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border-subtle);">类型/地区</th>
								<th style="width: 15%; padding: 12px 16px; font-size: 13px; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border-subtle);">评分</th>
								<th style="width: 15%; padding: 12px 16px; font-size: 13px; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border-subtle);">播放次数</th>
								<th style="width: 15%; padding: 12px 16px; font-size: 13px; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border-subtle);">操作</th>
							</tr>
							</thead>
							<tbody>
							<tr th:each="movie, iter : ${hotMovies}" th:if="${iter.index >= 3}">
								<td style="padding: 14px 16px; border-bottom: 1px solid var(--border-subtle);">
									<span th:text="${iter.index + 1}"
										  style="width: 24px; height: 24px; border-radius: 50%; background: var(--bg-primary); color: var(--text-secondary); display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600;"></span>
								</td>
								<td style="padding: 14px 16px; border-bottom: 1px solid var(--border-subtle);">
									<a th:href="@{/detail/{id}(id=${movie.id})}" th:text="${movie.title}"
									   style="color: var(--text-primary); text-decoration: none; font-weight: 500; font-size: 14px;"></a>
								</td>
								<td style="padding: 14px 16px; border-bottom: 1px solid var(--border-subtle); color: var(--text-secondary); font-size: 13px;">
									<span th:text="${movie.type}"></span> · <span th:text="${movie.region}"></span>
								</td>
								<td style="padding: 14px 16px; border-bottom: 1px solid var(--border-subtle);">
									<span style="display: inline-flex; align-items: center; gap: 4px; color: var(--accent); font-weight: 600; font-size: 13px;">
										<i class="bi bi-star-fill" style="color: #fbbf24;"></i>
										<span th:text="${movie.score}"></span>
									</span>
								</td>
								<td style="padding: 14px 16px; border-bottom: 1px solid var(--border-subtle); color: var(--text-secondary); font-size: 13px;">
									<span style="display: inline-flex; align-items: center; gap: 4px;">
										<i class="bi bi-eye-fill" style="color: var(--text-muted);"></i>
										<span th:text="${#numbers.formatDecimal(movie.views, 0, 'COMMA', 0, 'POINT')}"></span>
									</span>
								</td>
								<td style="padding: 14px 16px; border-bottom: 1px solid var(--border-subtle);">
									<a th:href="@{/detail/{id}(id=${movie.id})}" class="btn-ghost" style="padding: 6px 14px; font-size: 13px;">
										<i class="bi bi-play-fill"></i> 详情
									</a>
								</td>
							</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>

<!-- 底部 -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
