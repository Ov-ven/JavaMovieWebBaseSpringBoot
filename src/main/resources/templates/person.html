<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="fragments/header :: head(${person.name} + '的作品')">
</head>
<body>
<!-- 头部导航 -->
<div th:replace="fragments/header :: header"></div>

<!-- 面包屑导航 -->
<nav style="background:var(--bg-primary);border-bottom:1px solid var(--border-subtle);padding:12px 0;">
    <div class="container">
        <ol class="breadcrumb mb-0" style="background:transparent;padding:0;margin:0;">
            <li class="breadcrumb-item"><a th:href="@{/}" style="color:var(--text-secondary);text-decoration:none;">首页</a></li>
            <!-- 如果有来源电影 -->
            <li class="breadcrumb-item" th:if="${refererMovie}">
                <a th:href="@{'/detail/' + ${refererMovie.id}}" th:text="${refererMovie.title}" style="color:var(--text-secondary);text-decoration:none;"></a>
            </li>
            <li class="breadcrumb-item active" aria-current="page" style="color:var(--text-primary);">
                <span th:text="${person.name}"></span> 的作品
            </li>
        </ol>
    </div>
</nav>

<!-- 主创信息 -->
<section class="section">
    <div class="container">
        <div class="row g-4">
            <div class="col-lg-3 mb-4 text-center">
                <div>
                    <!-- <img th:src="${person.photo}" class="person-avatar" alt="主创头像"> -->
                    <h3 style="font-family:var(--font-display);font-weight:700;margin-top:12px;" th:text="${person.name}"></h3>
                    <p style="color:var(--text-muted);margin-bottom:0;" th:text="${person.type == 0} ? '演员' : '导演'"></p>
                </div>
            </div>

            <div class="col-lg-9">
                <!-- 简介部分 -->
                <div class="card-ed" style="padding:24px;margin-bottom:24px;">
                    <h4 style="font-family:var(--font-display);font-weight:600;margin-bottom:16px;">
                        <i class="bi bi-person-lines-fill me-2"></i>简介
                    </h4>
                    <div style="padding:0 12px;">
                        <p style="color:var(--text-secondary);line-height:1.8;" th:utext="${person.description ?: '暂无简介'}"></p>
                    </div>
                </div>

                <!-- 作品列表 -->
                <div class="card-ed" style="padding:24px;">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 style="font-family:var(--font-display);font-weight:600;margin-bottom:0;">
                            <i class="bi bi-film me-2"></i>参与作品
                            <span style="font-size:1rem;color:var(--text-muted);" th:text="'(' + ${movies.size()} + '部)'"></span>
                        </h4>

                        <!-- 缓存标识 -->
                        <span th:if="${cached}" style="background:var(--accent-light);color:var(--accent);padding:4px 12px;border-radius:var(--radius-full);font-size:12px;font-weight:600;">
                            <i class="bi bi-lightning-charge"></i> 快速加载
                        </span>
                    </div>

                    <!-- 电影列表 -->
                    <div th:if="${!movies.isEmpty()}" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 g-4">
                        <div th:each="movie : ${movies}" class="col">
                            <div class="movie-card">
                                <a th:href="@{'/detail/'+${movie.id}}" style="text-decoration:none;color:inherit;">
                                    <div class="movie-cover-wrap">
                                        <img th:src="@{'/image/'+${movie.cover}}" class="movie-cover" alt="电影封面">
                                        <span th:if="${movie.score != null}" class="movie-score">
                                            <i class="bi bi-star-fill"></i>
                                            <span th:text="${movie.score}"></span>
                                        </span>
                                    </div>
                                    <div class="movie-info">
                                        <div class="movie-title" th:text="${movie.title}"></div>
                                        <div class="d-flex justify-content-between align-items-center" style="margin-top:8px;">
                                            <span class="movie-meta" th:text="${movie.region}"></span>
                                            <a th:href="@{'/detail/'+${movie.id}}" class="btn-ghost" style="padding:6px 14px;font-size:12px;">
                                                查看详情
                                            </a>
                                        </div>
                                    </div>
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- 无作品提示 -->
                    <div th:if="${movies.isEmpty()}" style="text-align:center;padding:60px 0;color:var(--text-muted);">
                        <i class="bi bi-film" style="font-size:3rem;opacity:0.3;display:block;margin-bottom:12px;"></i>
                        <h4 style="font-family:var(--font-display);margin-bottom:8px;">暂无作品</h4>
                        <p>此主创暂无关联的电影作品</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- 底部 -->
<div th:replace="fragments/footer :: footer"></div>

<!-- 脚本 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
