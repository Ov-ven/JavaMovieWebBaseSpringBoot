<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="fragments/header :: head('懋懋助手 - AI 智能问答')"></th:block>
  <style>
    /* ========== 故障风格变量（与 design-system.css 一致） ========== */
    body.chat-glitch {
      --accent-glow: rgba(192, 57, 43, 0.35);
      --cyan: #00ffea;
      --red: #ff0040;
    }

    /* ========== CRT 扫描线（极淡，浅色主题下几乎不可见） ========== */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0, 0, 0, 0.015) 2px, rgba(0, 0, 0, 0.015) 4px
      );
    }

    /* ========== 聊天容器 ========== */
    .chat-wrap {
      max-width: 820px;
      margin: 0 auto;
      height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
      padding: 0 16px;
    }

    /* ========== 消息区域 ========== */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ========== 欢迎区域 ========== */
    .welcome-area {
      text-align: center;
      padding: 60px 20px;
    }
    .welcome-icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: var(--accent-light);
      border: 1px solid rgba(192, 57, 43, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
      color: var(--accent);
      position: relative;
      overflow: hidden;
    }
    .welcome-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .welcome-desc {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 24px;
    }

    /* ========== 快捷提问 ========== */
    .quick-questions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 500px;
      margin: 0 auto;
    }
    .quick-btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--bg-elevated);
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.25s;
      font-family: var(--font-body);
      position: relative;
      overflow: hidden;
    }
    .quick-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(192, 57, 43, 0.08);
      text-shadow: 0 0 8px var(--accent-glow);
    }
    .quick-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(192, 57, 43, 0.08), transparent);
      transition: left 0.4s;
    }
    .quick-btn:hover::before { left: 100%; }

    /* ========== 消息气泡 ========== */
    .msg {
      margin-bottom: 20px;
      display: flex;
      opacity: 0;
    }
    .msg.visible { opacity: 1; }
    .msg.user { justify-content: flex-end; }
    .msg .msg-content { max-width: 72%; }
    .msg .label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .msg.user .label { justify-content: flex-end; }
    .msg .label .avatar-sm {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }
    .msg .bubble {
      padding: 14px 18px;
      border-radius: 18px;
      line-height: 1.7;
      font-size: 15px;
      word-break: break-word;
      position: relative;
      overflow: hidden;
    }
    .msg.user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 6px;
    }
    .msg.ai .bubble {
      background: var(--bg-card);
      color: var(--text-primary);
      border-bottom-left-radius: 6px;
      border: 1px solid var(--border-subtle);
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .msg.ai .bubble a { color: var(--accent); text-decoration: underline; }

    /* ========== 字符样式 ========== */
    .char {
      display: inline;
      will-change: transform, opacity, text-shadow;
    }
    .char.space { width: 0.3em; display: inline-block; }

    /* ========== 打字指示器 ========== */
    .typing-indicator {
      display: flex;
      gap: 6px;
      padding: 4px 0;
      align-items: center;
    }
    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      opacity: 0.4;
    }

    /* ========== 输入区域 ========== */
    .chat-input {
      padding: 16px 0;
      background: var(--bg-primary);
    }
    .input-wrap {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 8px 8px 8px 20px;
      transition: all 0.3s;
      position: relative;
    }
    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.15), 0 0 20px rgba(192, 57, 43, 0.08);
    }
    .input-wrap::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 25px;
      background: linear-gradient(90deg, transparent 30%, var(--cyan) 50%, transparent 70%);
      opacity: 0;
      z-index: -1;
      transition: opacity 0.3s;
    }
    .input-wrap:focus-within::before {
      opacity: 0.06;
      animation: inputGlitchBorder 4s linear infinite;
    }
    @keyframes inputGlitchBorder {
      0%, 90%, 100% { opacity: 0.06; transform: translateX(0); }
      92% { opacity: 0.15; transform: translateX(-2px); }
      94% { opacity: 0.06; transform: translateX(1px); }
      96% { opacity: 0.12; transform: translateX(-1px); }
    }
    .input-wrap input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: var(--font-body);
      font-size: 15px;
      color: var(--text-primary);
      padding: 8px 0;
    }
    .input-wrap input::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .send-btn:hover {
      background: var(--accent-hover);
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
    .send-btn i { font-size: 16px; }
    .send-btn.sending { animation: sendGlitch 0.6s ease-out; }
    @keyframes sendGlitch {
      0% { transform: scale(1); }
      15% { transform: scale(1.15) skewX(-5deg); background: var(--cyan); }
      30% { transform: scale(0.95) skewX(3deg); background: var(--red); }
      50% { transform: scale(1.05); background: var(--accent); }
      100% { transform: scale(1); }
    }

    /* ========== Markdown 渲染 ========== */
    .msg.ai .bubble p { margin: 6px 0; }
    .msg.ai .bubble h1, .msg.ai .bubble h2, .msg.ai .bubble h3 {
      margin-top: 12px;
      margin-bottom: 6px;
      font-weight: 700;
      font-family: var(--font-display);
    }
    .msg.ai .bubble h1 { font-size: 1.3em; }
    .msg.ai .bubble h2 { font-size: 1.15em; }
    .msg.ai .bubble h3 { font-size: 1.05em; }
    .msg.ai .bubble ul, .msg.ai .bubble ol { padding-left: 20px; margin: 6px 0; }
    .msg.ai .bubble li { margin-bottom: 4px; }
    .msg.ai .bubble code {
      background: var(--bg-primary);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'Menlo', 'Consolas', monospace;
    }
    .msg.ai .bubble pre {
      background: var(--bg-primary);
      padding: 14px;
      border-radius: var(--radius-sm);
      overflow-x: auto;
      margin: 10px 0;
      border: 1px solid var(--border-subtle);
    }
    .msg.ai .bubble pre code { background: none; padding: 0; }
    .msg.ai .bubble table { border-collapse: collapse; margin: 10px 0; width: 100%; }
    .msg.ai .bubble th, .msg.ai .bubble td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
      font-size: 14px;
    }
    .msg.ai .bubble th { background: var(--bg-primary); font-weight: 600; }
    .msg.ai .bubble blockquote {
      border-left: 2px solid var(--accent);
      padding-left: 14px;
      margin: 10px 0;
      color: var(--text-secondary);
    }

    /* ========== 响应式 ========== */
    @media (max-width: 768px) {
      .chat-wrap { padding: 0 12px; height: calc(100vh - 100px); }
      .msg .msg-content { max-width: 88%; }
      .welcome-area { padding: 30px 10px; }
      .quick-questions { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body class="chat-glitch">

<!-- 故障风格覆盖层 -->
<div class="scanlines"></div>

<div th:replace="fragments/header :: header"></div>

<div class="chat-wrap">
  <!-- 消息区域 -->
  <div class="chat-messages" id="chatMessages">

    <!-- 欢迎区域 -->
    <div class="welcome-area" id="welcomeArea">
      <div class="welcome-icon" id="welcomeIcon"><i class="bi bi-robot"></i></div>
      <div class="welcome-title" id="welcomeTitle">你好，我是懋懋助手</div>
      <div class="welcome-desc" id="welcomeDesc">可以帮你搜索电影、推荐影片、查询订单、下单购买</div>
      <div class="quick-questions" id="quickQuestions">
        <button class="quick-btn" onclick="askQuick(this)" style="opacity:1;visibility:visible;">推荐几部高分科幻电影</button>
        <button class="quick-btn" onclick="askQuick(this)" style="opacity:1;visibility:visible;">我有哪些待支付订单</button>
        <button class="quick-btn" onclick="askQuick(this)" style="opacity:1;visibility:visible;">帮我充值50元</button>
        <button class="quick-btn" onclick="askQuick(this)" style="opacity:1;visibility:visible;">我是VIP吗</button>
      </div>
    </div>
  </div>

  <!-- 输入区域 -->
  <div class="chat-input">
    <form id="chatForm" class="input-wrap">
      <input type="text" id="userInput" placeholder="输入消息..." autocomplete="off">
      <button type="submit" class="send-btn" id="sendBtn">
        <i class="bi bi-send-fill"></i>
      </button>
    </form>
  </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script th:src="@{/js/animations.js}"></script>
<script>
  const chatMessages = document.getElementById('chatMessages');
  const chatForm = document.getElementById('chatForm');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const welcomeArea = document.getElementById('welcomeArea');

  // ==========================================
  //  欢迎区域故障入场动画
  // ==========================================
  function animateWelcome() {
    const icon = document.getElementById('welcomeIcon');
    const title = document.getElementById('welcomeTitle');
    const desc = document.getElementById('welcomeDesc');
    const btns = document.querySelectorAll('.quick-btn');

    if (typeof gsap === 'undefined') return;

    // 图标：故障出现
    const iconTl = gsap.timeline();
    iconTl.from(icon, {
      opacity: 0, scale: 1.5, filter: "blur(8px)",
      duration: 0.5, ease: "power4.out",
    });
    iconTl.fromTo(icon, {
      borderColor: "rgba(0, 255, 234, 0.5)",
      boxShadow: "0 0 12px rgba(0, 255, 234, 0.3)",
    }, {
      borderColor: "rgba(192, 57, 43, 0.2)",
      boxShadow: "none",
      duration: 0.3,
    }, 0.1);

    // 标题：字符级故障
    const titleText = title.textContent;
    title.textContent = '';
    title.style.opacity = 1;
    titleText.split('').forEach(ch => {
      const span = document.createElement('span');
      span.style.display = 'inline';
      span.textContent = ch;
      title.appendChild(span);
    });
    const titleSpans = title.querySelectorAll('span');
    gsap.from(titleSpans, {
      opacity: 0,
      x: () => gsap.utils.random(-5, 5),
      textShadow: () => `${gsap.utils.random(-2,2)}px 0 rgba(255,0,64,0.5), ${gsap.utils.random(-2,2)}px 0 rgba(0,255,234,0.5)`,
      duration: 0.12,
      stagger: 0.025,
      ease: "power2.out",
      delay: 0.3,
      onComplete: () => titleSpans.forEach(s => s.style.textShadow = 'none'),
    });

    // 描述
    gsap.from(desc, {
      opacity: 0, filter: "blur(4px)",
      duration: 0.4, delay: 0.8, ease: "power2.out",
    });

    // 快捷按钮：直接显示（不做动画，避免 GSAP 冲突导致不可见）
    btns.forEach((btn, i) => {
      btn.style.opacity = '1';
      btn.style.visibility = 'visible';
    });
  }

  // ==========================================
  //  全局微故障效果
  // ==========================================
  function initGlobalGlitch() {
    // 随机微故障（极低概率，极轻微）
    setInterval(() => {
      if (Math.random() > 0.97) {
        gsap.to('body', {
          x: gsap.utils.random(-0.5, 0.5),
          duration: 0.04,
          onComplete: () => gsap.set('body', { x: 0 }),
        });
      }
    }, 3000);

    // 扫描线偶尔闪烁
    const scanlines = document.querySelector('.scanlines');
    if (scanlines) {
      setInterval(() => {
        if (Math.random() > 0.95) {
          gsap.to(scanlines, {
            opacity: gsap.utils.random(0.3, 0.8),
            duration: 0.05,
            onComplete: () => gsap.to(scanlines, { opacity: 1, duration: 0.1 }),
          });
        }
      }, 4000);
    }
  }

  // ==========================================
  //  用户消息入场（故障弹入）
  // ==========================================
  function animateUserBubble(el) {
    if (typeof gsap === 'undefined') { el.classList.add('visible'); return; }
    gsap.set(el, { opacity: 1 });
    const tl = gsap.timeline();
    tl.from(el, {
      x: 30, y: -10, scale: 0.9, opacity: 0,
      filter: "blur(4px)", duration: 0.35, ease: "power3.out",
    });
    tl.to(el, {
      x: gsap.utils.random(-3, 3),
      duration: 0.05, repeat: 2, yoyo: true, ease: "none",
    }, 0.05);
    tl.to(el, { x: 0, duration: 0.1 });
  }

  // ==========================================
  //  AI 气泡入场（故障展开）
  // ==========================================
  function animateAIBubble(msgEl) {
    if (typeof gsap === 'undefined') { msgEl.classList.add('visible'); return; }
    const bubble = msgEl.querySelector('.bubble');
    gsap.set(msgEl, { opacity: 1 });
    const tl = gsap.timeline();
    // 外层 msg 整体淡入
    tl.from(msgEl, {
      y: 12, opacity: 0, filter: "blur(6px)",
      duration: 0.3, ease: "power2.out",
    });
    // 内层 bubble 缩放抖动
    if (bubble) {
      tl.from(bubble, {
        scaleX: 0.95, duration: 0.2, ease: "power2.out",
      }, 0);
      // 边框故障闪烁（青色 → 恢复原色）
      tl.fromTo(bubble, {
        borderColor: "rgba(0, 255, 234, 0.4)",
        boxShadow: "-2px 0 rgba(255,0,64,0.1), 2px 0 rgba(0,255,234,0.1)",
      }, {
        borderColor: "#f0ede8", boxShadow: "0 1px 4px rgba(0,0,0,0.04)",
        duration: 0.25, ease: "power2.out",
      }, 0.1);
      // 扫描线闪过
      const scanLine = bubble.querySelector('.ai-scan-line');
      if (scanLine) {
        tl.fromTo(scanLine, { top: '-5%', opacity: 0.5 }, {
          top: '105%', opacity: 0, duration: 0.6, ease: "none",
        }, 0);
      }
    }
  }

  // ==========================================
  //  故障文字流式追加
  // ==========================================
  function glitchStreamAppend(bubbleEl, text) {
    const chars = text.split('');
    let delay = 0;

    chars.forEach(char => {
      const span = document.createElement('span');
      span.className = 'char' + (char === ' ' ? ' space' : '');
      span.textContent = char;
      bubbleEl.appendChild(span);

      if (char !== '\n' && char !== ' ' && typeof gsap !== 'undefined') {
        const tl = gsap.timeline({ delay });
        // RGB 分离 + 抖动（浅色主题下更轻微）
        tl.fromTo(span, {
          textShadow: '-1px 0 rgba(255,0,64,0.6), 1px 0 rgba(0,255,234,0.6)',
          x: () => gsap.utils.random(-2, 2),
          opacity: 0.5,
        }, {
          textShadow: '-1px 0 rgba(255,0,64,0.6), 1px 0 rgba(0,255,234,0.6)',
          x: () => gsap.utils.random(-2, 2),
          opacity: 0.7,
          duration: 0.04, repeat: 2, yoyo: true, ease: "none",
        });
        // 稳定
        tl.to(span, {
          textShadow: 'none', x: 0, opacity: 1,
          duration: 0.1, ease: "power2.out",
        });
        // 红色高亮渐灭（恢复为正文色）
        tl.fromTo(span, {
          color: '#c0392b',
        }, {
          color: '#1a1a1a',
          duration: 0.25, ease: "power1.out",
        }, 0.04);

        delay += 0.03;
      }
    });

    return delay;
  }

  // ==========================================
  //  打字指示器
  // ==========================================
  function createTypingIndicator() {
    const div = document.createElement('div');
    div.className = 'typing-indicator';
    for (let i = 0; i < 3; i++) {
      const dot = document.createElement('span');
      dot.className = 'typing-dot';
      div.appendChild(dot);
    }
    return div;
  }

  function animateTypingDots(container) {
    if (typeof gsap === 'undefined') return;
    const dots = container.querySelectorAll('.typing-dot');
    dots.forEach((dot, i) => {
      const tl = gsap.timeline({ repeat: -1, delay: i * 0.15 });
      tl.to(dot, { opacity: 1, scale: 1.2, duration: 0.2, ease: "power1.inOut" });
      tl.to(dot, { opacity: 0.3, scale: 1, duration: 0.2, ease: "power1.inOut" });
    });
  }

  // ==========================================
  //  发送按钮故障动画
  // ==========================================
  function animateSendButton() {
    sendBtn.classList.add('sending');
    setTimeout(() => sendBtn.classList.remove('sending'), 600);
  }

  // ==========================================
  //  快捷提问
  // ==========================================
  function askQuick(btn) {
    const msg = btn.textContent;
    userInput.value = msg;
    chatForm.dispatchEvent(new Event('submit'));
  }

  // ==========================================
  //  消息构建
  // ==========================================
  function appendMessage(role, html) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    const label = role === 'user' ? '我' : '懋懋助手';
    const avatarBg = role === 'user' ? 'var(--accent)' : 'rgba(192,57,43,0.15)';
    const avatarColor = role === 'user' ? '#fff' : 'var(--accent)';
    const avatarIcon = role === 'user' ? 'bi-person-fill' : 'bi-robot';

    div.innerHTML = '<div class="msg-content"><div class="label"><span class="avatar-sm" style="background:' +
      avatarBg + ';color:' + avatarColor + '"><i class="bi ' + avatarIcon + '"></i></span>' +
      label + '</div><div class="bubble">' + (html || '') + '</div></div>';

    // AI 气泡加扫描线元素
    if (role === 'ai') {
      const scanLine = document.createElement('div');
      scanLine.className = 'ai-scan-line';
      scanLine.style.cssText = 'position:absolute;left:0;width:100%;height:1px;background:linear-gradient(90deg,transparent,#00ffea,transparent);opacity:0;pointer-events:none;';
      div.querySelector('.bubble').appendChild(scanLine);
    }

    chatMessages.appendChild(div);
    return div;
  }

  // ==========================================
  //  主发送流程
  // ==========================================
  chatForm.addEventListener('submit', function(e) {
    e.preventDefault();
    const message = userInput.value.trim();
    if (!message) return;
    userInput.value = '';

    // 隐藏欢迎区域
    if (welcomeArea && welcomeArea.style.display !== 'none' && typeof gsap !== 'undefined') {
      gsap.to(welcomeArea, {
        opacity: 0, y: -20, filter: "blur(8px)",
        duration: 0.3, ease: "power2.in",
        onComplete: () => { welcomeArea.style.display = 'none'; },
      });
    } else if (welcomeArea) {
      welcomeArea.style.display = 'none';
    }

    sendMessage(message);
  });

  async function sendMessage(message) {
    // 1. 用户消息
    const userDiv = appendMessage('user', escapeHtml(message));
    animateUserBubble(userDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    // 2. 发送按钮故障 + 禁用
    sendBtn.disabled = true;
    animateSendButton();

    // 3. AI 打字指示器
    await new Promise(r => setTimeout(r, 300));
    const aiDiv = appendMessage('ai', '');
    const typingEl = createTypingIndicator();
    aiDiv.querySelector('.bubble').appendChild(typingEl);
    animateTypingDots(typingEl);
    animateAIBubble(aiDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    try {
      const response = await fetch('/api/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
        body: JSON.stringify({ message: message }),
      });

      if (!response.ok) throw new Error('HTTP ' + response.status);

      // 移除打字指示器
      typingEl.remove();

      const reader = response.body.getReader();
      const decoder = new TextDecoder('utf-8');
      let done = false;
      let fullText = "";
      let buffer = "";

      if (window.marked) {
        marked.setOptions({ breaks: true });
        // 自定义renderer允许HTML标签渲染
        const renderer = new marked.Renderer();
        renderer.html = function(html) { return html; };
        marked.setOptions({ breaks: true, renderer: renderer });
      }

      const bubble = aiDiv.querySelector('.bubble');

      while (!done) {
        const { value, done: readerDone } = await reader.read();
        done = readerDone;
        if (value) buffer += decoder.decode(value, { stream: true });
        if (done) buffer += decoder.decode(new Uint8Array(), { stream: false });

        let parts = buffer.split('\n\n');
        if (!done) { buffer = parts.pop(); } else { buffer = ""; }

        for (const part of parts) {
          if (!part.trim()) continue;
          const lines = part.split('\n');
          let eventData = [];
          for (const line of lines) {
            if (line.startsWith('data:')) {
              let text = line.substring(5);
              if (text.startsWith(' ')) text = text.substring(1);
              eventData.push(text);
            }
          }

          if (eventData.length > 0) {
            const chunk = eventData.join('\n');
            fullText += chunk;
            // 使用故障流式追加
            glitchStreamAppend(bubble, chunk);
            chatMessages.scrollTop = chatMessages.scrollHeight;
          }
        }
      }

      // 流结束后：处理内容
      if (fullText.trim()) {
        // 检测电影卡片标记（更宽松的匹配，处理流式传输截断）
        const cardsRegex = /(?:__MOVIE_CARDS__|CARDS__|\[__)\s*(\[.*?\])\s*__END__/s;
        const cardsMatch = fullText.match(cardsRegex);
        if (cardsMatch) {
          try {
            const movies = JSON.parse(cardsMatch[1]);
            const prefix = fullText.substring(0, cardsMatch.index).trim();
            const suffix = fullText.substring(cardsMatch.index + cardsMatch[0].length).trim();
            let html = '';
            if (prefix) html += '<p>' + escapeHtml(prefix) + '</p>';
            html += renderMovieCards(movies);
            if (suffix) html += '<p>' + escapeHtml(suffix) + '</p>';
            bubble.innerHTML = html;
          } catch (e) {
            console.error('解析电影卡片失败:', e);
            bubble.innerHTML = marked.parse(fullText);
          }
        } else if (window.marked) {
          bubble.innerHTML = marked.parse(fullText);
        } else {
          bubble.innerHTML = fullText;
        }
        // 完成闪烁
        if (typeof gsap !== 'undefined') {
          gsap.fromTo(bubble, {
            borderColor: "rgba(0, 255, 234, 0.3)",
          }, {
            borderColor: "#f0ede8",
            duration: 0.4, ease: "power2.out",
          });
        }
      } else {
        bubble.innerHTML = '<span style="color:var(--text-muted)">（智能助手未返回内容）</span>';
      }

    } catch (error) {
      // 移除打字指示器（如果还在）
      if (typingEl.parentNode) typingEl.remove();
      const bubble = aiDiv.querySelector('.bubble');
      bubble.innerHTML = '<span style="color:var(--accent)"><i class="bi bi-exclamation-triangle me-1"></i>网络连接中断：' + escapeHtml(error.message) + '</span>';
    } finally {
      sendBtn.disabled = false;
      userInput.focus();
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // 渲染电影卡片
  function renderMovieCards(movies) {
    let html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin:16px 0;">';
    movies.forEach(m => {
      html += '<a href="/detail/' + m.id + '" target="_blank" style="text-decoration:none;color:inherit;border:1px solid #e0e0e0;border-radius:10px;overflow:hidden;transition:all 0.2s;cursor:pointer;background:#fff;" onmouseover="this.style.boxShadow=\'0 6px 16px rgba(0,0,0,0.15)\';this.style.transform=\'translateY(-3px)\'" onmouseout="this.style.boxShadow=\'none\';this.style.transform=\'none\'">';
      if (m.cover) {
        html += '<img src="/image/' + m.cover + '" style="width:100%;height:160px;object-fit:cover;" alt="' + escapeHtml(m.title) + '"/>';
      } else {
        html += '<div style="width:100%;height:160px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;color:#999;">暂无海报</div>';
      }
      html += '<div style="padding:10px 12px;">';
      html += '<div style="font-weight:600;font-size:15px;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escapeHtml(m.title) + '</div>';
      html += '<div style="font-size:13px;color:#666;margin-bottom:6px;">' + escapeHtml(m.type) + ' · ' + escapeHtml(m.region) + '</div>';
      html += '<div style="font-size:13px;"><span style="color:#ff9800;">★ ' + (m.score || 0).toFixed(1) + '</span>';
      if (m.isVip === 1) {
        html += ' <span style="color:#c0392b;">VIP</span>';
      }
      html += '</div></div></a>';
    });
    html += '</div>';
    return html;
  }

  // 回车发送
  userInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      chatForm.dispatchEvent(new Event('submit'));
    }
  });

  // ==========================================
  //  初始化
  // ==========================================
  window.addEventListener('DOMContentLoaded', () => {
    animateWelcome();
    initGlobalGlitch();
    userInput.focus();
  });
</script>
</body>
</html>
