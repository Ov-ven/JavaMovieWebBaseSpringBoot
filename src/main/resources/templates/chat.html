<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="fragments/header :: head('懋懋助手 - AI 智能问答')"></th:block>
  <style>
    /* ========== 粒子背景 ========== */
    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    /* ========== 聊天容器 ========== */
    .chat-wrap {
      max-width: 820px;
      margin: 0 auto;
      height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
      padding: 0 16px;
    }

    /* ========== 消息区域 ========== */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ========== 欢迎区域 ========== */
    .welcome-area {
      text-align: center;
      padding: 60px 20px;
    }
    .welcome-icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
      color: var(--accent);
    }
    .welcome-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .welcome-desc {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 24px;
    }

    /* ========== 快捷提问 ========== */
    .quick-questions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 500px;
      margin: 0 auto;
    }
    .quick-btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      background: var(--bg-elevated);
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-body);
    }
    .quick-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    /* ========== 消息气泡 ========== */
    .msg {
      margin-bottom: 20px;
      display: flex;
      opacity: 0;
      transform: translateY(12px);
    }
    .msg.visible {
      opacity: 1;
      transform: translateY(0);
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .msg.user { justify-content: flex-end; }
    .msg .msg-content { max-width: 72%; }
    .msg .label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .msg.user .label { justify-content: flex-end; }
    .msg .label .avatar-sm {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }
    .msg .bubble {
      padding: 14px 18px;
      border-radius: 18px;
      line-height: 1.65;
      font-size: 15px;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 6px;
    }
    .msg.ai .bubble {
      background: var(--bg-card);
      color: var(--text-primary);
      border-bottom-left-radius: 6px;
      border: 1px solid var(--border-subtle);
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .msg.ai .bubble a { color: var(--accent); text-decoration: underline; }

    /* ========== 打字指示器 ========== */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }
    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      opacity: 0.4;
    }

    /* ========== 输入区域 ========== */
    .chat-input {
      padding: 16px 0;
      background: var(--bg-primary);
    }
    .input-wrap {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 8px 8px 8px 20px;
      transition: all 0.3s;
    }
    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }
    .input-wrap input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: var(--font-body);
      font-size: 15px;
      color: var(--text-primary);
      padding: 8px 0;
    }
    .input-wrap input::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .send-btn i { font-size: 16px; }

    /* ========== Markdown 渲染 ========== */
    .msg.ai .bubble p { margin: 6px 0; }
    .msg.ai .bubble h1, .msg.ai .bubble h2, .msg.ai .bubble h3 {
      margin-top: 12px;
      margin-bottom: 6px;
      font-weight: 700;
      font-family: var(--font-display);
    }
    .msg.ai .bubble h1 { font-size: 1.3em; }
    .msg.ai .bubble h2 { font-size: 1.15em; }
    .msg.ai .bubble h3 { font-size: 1.05em; }
    .msg.ai .bubble ul, .msg.ai .bubble ol { padding-left: 20px; margin: 6px 0; }
    .msg.ai .bubble li { margin-bottom: 4px; }
    .msg.ai .bubble code {
      background: var(--bg-primary);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'Menlo', 'Consolas', monospace;
    }
    .msg.ai .bubble pre {
      background: var(--bg-primary);
      padding: 14px;
      border-radius: var(--radius-sm);
      overflow-x: auto;
      margin: 10px 0;
      border: 1px solid var(--border-subtle);
    }
    .msg.ai .bubble pre code { background: none; padding: 0; }
    .msg.ai .bubble table { border-collapse: collapse; margin: 10px 0; width: 100%; }
    .msg.ai .bubble th, .msg.ai .bubble td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
      font-size: 14px;
    }
    .msg.ai .bubble th { background: var(--bg-primary); font-weight: 600; }
    .msg.ai .bubble blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 14px;
      margin: 10px 0;
      color: var(--text-secondary);
    }

    /* ========== 响应式 ========== */
    @media (max-width: 768px) {
      .chat-wrap { padding: 0 12px; height: calc(100vh - 100px); }
      .msg .msg-content { max-width: 88%; }
      .welcome-area { padding: 30px 10px; }
      .quick-questions { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
<canvas id="particleCanvas"></canvas>
<div th:replace="fragments/header :: header"></div>

<div class="chat-wrap">
  <!-- 消息区域 -->
  <div class="chat-messages" id="chatMessages">

    <!-- 欢迎区域（首次进入时显示） -->
    <div class="welcome-area" id="welcomeArea">
      <div class="welcome-icon"><i class="bi bi-robot"></i></div>
      <div class="welcome-title">你好，我是懋懋助手</div>
      <div class="welcome-desc">可以帮你搜索电影、推荐影片、查询订单、下单购买</div>
      <div class="quick-questions">
        <button class="quick-btn" onclick="askQuick(this)">推荐几部高分科幻电影</button>
        <button class="quick-btn" onclick="askQuick(this)">我有哪些待支付订单</button>
        <button class="quick-btn" onclick="askQuick(this)">帮我充值50元</button>
        <button class="quick-btn" onclick="askQuick(this)">我是VIP吗</button>
      </div>
    </div>
  </div>

  <!-- 输入区域 -->
  <div class="chat-input">
    <form id="chatForm" class="input-wrap">
      <input type="text" id="userInput" placeholder="输入消息..." autocomplete="off">
      <button type="submit" class="send-btn" id="sendBtn">
        <i class="bi bi-send-fill"></i>
      </button>
    </form>
  </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script th:src="@{/js/animations.js}"></script>
<script>
  const chatMessages = document.getElementById('chatMessages');
  const chatForm = document.getElementById('chatForm');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const welcomeArea = document.getElementById('welcomeArea');

  // 快捷提问
  function askQuick(btn) {
    const msg = btn.textContent;
    userInput.value = msg;
    chatForm.dispatchEvent(new Event('submit'));
  }

  chatForm.addEventListener('submit', function(e) {
    e.preventDefault();
    const message = userInput.value.trim();
    if (!message) return;
    userInput.value = '';

    // 隐藏欢迎区域
    if (welcomeArea) {
      welcomeArea.style.display = 'none';
    }

    sendMessage(message);
  });

  function appendMessage(role, html) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    const label = role === 'user' ? '我' : '懋懋助手';
    const avatarClass = role === 'user' ? 'bg-primary' : '';
    const avatarIcon = role === 'user' ? '<i class="bi bi-person-fill"></i>' : '<i class="bi bi-robot"></i>';
    div.innerHTML = '<div class="msg-content"><div class="label"><span class="avatar-sm" style="background:' +
      (role === 'user' ? 'var(--accent)' : 'var(--accent-light)') + ';color:' +
      (role === 'user' ? '#fff' : 'var(--accent)') + '">' + avatarIcon + '</span>' + label + '</div><div class="bubble">' + html + '</div></div>';
    chatMessages.appendChild(div);

    // GSAP 入场动画
    requestAnimationFrame(() => {
      div.classList.add('visible');
      chatMessages.scrollTop = chatMessages.scrollHeight;
    });

    return div.querySelector('.bubble');
  }

  // 打字指示器 HTML
  function typingHTML() {
    return '<div class="typing-indicator"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';
  }

  async function sendMessage(message) {
    // 1. 显示用户消息
    appendMessage('user', escapeHtml(message));

    // 2. 创建 AI 气泡（打字指示器）
    const aiBubble = appendMessage('ai', typingHTML());
    sendBtn.disabled = true;

    // GSAP 打字动画
    if (typeof gsap !== 'undefined') {
      gsap.utils.toArray('.typing-dot').forEach((dot, i) => {
        gsap.to(dot, {
          opacity: 1,
          duration: 0.4,
          delay: i * 0.15,
          repeat: -1,
          yoyo: true,
          ease: 'power1.inOut'
        });
      });
    }

    try {
      const response = await fetch('/api/chat/stream', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'text/event-stream'
        },
        body: JSON.stringify({ message: message })
      });

      if (!response.ok) {
        throw new Error('HTTP ' + response.status);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder('utf-8');
      let done = false;
      let fullText = "";
      let buffer = "";

      if (window.marked) {
        marked.setOptions({ breaks: true });
      }

      while (!done) {
        const { value, done: readerDone } = await reader.read();
        done = readerDone;

        if (value) {
          buffer += decoder.decode(value, { stream: true });
        }

        if (done) {
          buffer += decoder.decode(new Uint8Array(), { stream: false });
        }

        let parts = buffer.split('\n\n');

        if (!done) {
          buffer = parts.pop();
        } else {
          buffer = "";
        }

        for (const part of parts) {
          if (!part.trim()) continue;

          const lines = part.split('\n');
          let eventData = [];

          for (const line of lines) {
            if (line.startsWith('data:')) {
              let text = line.substring(5);
              if (text.startsWith(' ')) {
                text = text.substring(1);
              }
              eventData.push(text);
            }
          }

          if (eventData.length > 0) {
            fullText += eventData.join('\n');
            if (window.marked && aiBubble) {
              aiBubble.innerHTML = marked.parse(fullText);
              chatMessages.scrollTop = chatMessages.scrollHeight;
            }
          }
        }
      }

      // 流结束后最终渲染
      if (fullText.trim()) {
        aiBubble.innerHTML = marked.parse(fullText);
      } else {
        aiBubble.innerHTML = '<span style="color:var(--text-muted)">（智能助手未返回内容）</span>';
      }

    } catch (error) {
      aiBubble.innerHTML = '<span style="color:var(--accent)"><i class="bi bi-exclamation-triangle me-1"></i>网络连接中断：' + escapeHtml(error.message) + '</span>';
    } finally {
      sendBtn.disabled = false;
      userInput.focus();
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // 回车发送
  userInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      chatForm.dispatchEvent(new Event('submit'));
    }
  });

  // ========== 粒子背景动画 ==========
  (function() {
    const canvas = document.getElementById('particleCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let particles = [];
    const PARTICLE_COUNT = 50;
    const MAX_DIST = 120;

    // 主题色
    const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#c0392b';

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function createParticle() {
      return {
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: Math.random() * 2 + 1,
        alpha: Math.random() * 0.3 + 0.1
      };
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push(createParticle());
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 画连线
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < MAX_DIST) {
            const lineAlpha = (1 - dist / MAX_DIST) * 0.08;
            ctx.strokeStyle = `rgba(192, 57, 43, ${lineAlpha})`;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }

      // 画粒子
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(192, 57, 43, ${p.alpha})`;
        ctx.fill();
      });
    }

    function animate() {
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

        // 边界修正
        p.x = Math.max(0, Math.min(canvas.width, p.x));
        p.y = Math.max(0, Math.min(canvas.height, p.y));
      });

      draw();
      requestAnimationFrame(animate);
    }

    animate();
  })();
</script>
</body>
</html>
