<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="fragments/header :: head('升级VIP会员 - 电影平台')"></th:block>
  <style>
    .vip-container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    .vip-header { text-align: center; margin-bottom: 40px; }
    .vip-header h1 { font-family: var(--font-display); font-weight: 700; color: var(--text-primary); margin-bottom: 10px; }
    .vip-header p { color: var(--text-secondary); max-width: 600px; margin: 0 auto; }
    .plan-card { margin-bottom: 30px; padding: 0; overflow: hidden; }
    .plan-card .card-body { padding: 0; }
    .plan-card:hover { transform: translateY(-5px); }
    .plan-card.featured { border: 2px solid var(--accent); transform: scale(1.05); box-shadow: 0 15px 30px rgba(192,57,43,0.15); position: relative; }
    .plan-card.featured::before { content: "最受欢迎"; position: absolute; top: -1px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; padding: 5px 18px; border-radius: 0 0 var(--radius-sm) var(--radius-sm); font-size: 13px; font-weight: 600; z-index: 2; }
    .plan-header { padding: 25px; text-align: center; border-bottom: 1px solid var(--border-subtle); }
    .plan-header h3 { font-family: var(--font-display); font-weight: 700; margin-bottom: 5px; color: var(--text-primary); }
    .plan-price { font-size: 36px; font-weight: 700; color: var(--text-primary); }
    .plan-price small { font-size: 16px; font-weight: 400; color: var(--text-secondary); }
    .plan-features { padding: 20px; }
    .plan-feature { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border-subtle); color: var(--text-primary); font-size: 14px; }
    .plan-feature:last-child { border-bottom: none; }
    .plan-feature i { margin-right: 12px; width: 24px; text-align: center; }
    .plan-feature.active i { color: var(--accent); }
    .plan-feature.inactive i { color: var(--text-muted); }
    .plan-cta { padding: 20px; text-align: center; }
    .summary { margin-top: 30px; padding: 30px; }
    .summary h3 { font-family: var(--font-display); font-weight: 700; color: var(--text-primary); margin-bottom: 16px; }
    .summary-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-subtle); color: var(--text-primary); font-size: 15px; }
    .summary-item:last-child { border-bottom: none; }
    .summary-total { font-weight: 700; font-size: 18px; }
    .summary-total .price { color: var(--accent); }
    .btn-confirm { width: 100%; margin-top: 20px; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @media (max-width: 768px) { .plan-card.featured { transform: scale(1); } }
  </style>
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<!-- 主内容 -->
<div class="vip-container">
  <div class="vip-header">
    <h1>升级为VIP会员</h1>
    <p>解锁全部特权，享受无广告、高清观影体验</p>
  </div>

  <!-- 套餐选择 -->
  <div class="row">
    <!-- 月度套餐 -->
    <div class="col-md-4">
      <div class="plan-card card-ed">
        <div class="plan-header">
          <h3>月度会员</h3>
          <div class="plan-price">¥19.9<small>/月</small></div>
        </div>
        <div class="plan-features">
          <div class="plan-feature active"><i class="bi bi-check-circle-fill"></i><span>无广告观看</span></div>
          <div class="plan-feature active"><i class="bi bi-check-circle-fill"></i><span>1080p高清画质</span></div>
          <div class="plan-feature active"><i class="bi bi-check-circle-fill"></i><span>每月更新影片</span></div>
          <div class="plan-feature inactive"><i class="bi bi-x-circle"></i><span>离线下载</span></div>
          <div class="plan-feature inactive"><i class="bi bi-x-circle"></i><span>独家内容</span></div>
        </div>
        <div class="plan-cta">
          <button class="btn-primary select-plan" data-plan="monthly" data-amount="19.9" data-name="月度会员">立即开通</button>
        </div>
      </div>
    </div>
    <!-- 季度套餐 -->
    <div class="col-md-4">
      <div class="plan-card card-ed featured">
        <div class="plan-header">
          <h3>季度会员</h3>
          <div class="plan-price">¥49.9<small>/季度</small></div>
          <div style="color:var(--accent);font-weight:600;font-size:14px;">节省¥9.8</div>
        </div>
        <div class="plan-features">
          <div class="plan-feature active"><i class="bi bi-check-circle-fill"></i><span>无广告观看</span></div>
          <div class="plan-feature active"><i class="bi bi-check-circle-fill"></i><span>1080p高清画质</span></div>
          <div class="plan-feature active"><i class="bi bi-check-circle-fill"></i><span>每月更新影片</span></div>
          <div class="plan-feature active"><i class="bi bi-check-circle-fill"></i><span>离线下载</span></div>
          <div class="plan-feature inactive"><i class="bi bi-x-circle"></i><span>独家内容</span></div>
        </div>
        <div class="plan-cta">
          <button class="btn-primary select-plan" data-plan="quarterly" data-amount="49.9" data-name="季度会员">立即开通</button>
        </div>
      </div>
    </div>
    <!-- 年度套餐 -->
    <div class="col-md-4">
      <div class="plan-card card-ed">
        <div class="plan-header">
          <h3>年度会员</h3>
          <div class="plan-price">¥159<small>/年</small></div>
          <div style="color:var(--accent);font-weight:600;font-size:14px;">节省¥79.8</div>
        </div>
        <div class="plan-features">
          <div class="plan-feature active"><i class="bi bi-check-circle-fill"></i><span>无广告观看</span></div>
          <div class="plan-feature active"><i class="bi bi-check-circle-fill"></i><span>4K超清画质</span></div>
          <div class="plan-feature active"><i class="bi bi-check-circle-fill"></i><span>无限更新影片</span></div>
          <div class="plan-feature active"><i class="bi bi-check-circle-fill"></i><span>离线下载</span></div>
          <div class="plan-feature active"><i class="bi bi-check-circle-fill"></i><span>独家内容</span></div>
        </div>
        <div class="plan-cta">
          <button class="btn-primary select-plan" data-plan="yearly" data-amount="159" data-name="年度会员">立即开通</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 订单摘要 -->
  <div class="summary card-ed">
    <h3>订单摘要</h3>
    <div class="summary-item">
      <span>套餐</span>
      <span id="selected-plan-text">季度会员</span>
    </div>
    <div class="summary-item summary-total">
      <span>总计</span>
      <span class="price" id="selected-price">¥49.9</span>
    </div>
    <button class="btn-primary btn-confirm" id="confirm-payment" style="justify-content:center;">支付宝支付</button>
    <button class="btn-ghost btn-confirm mt-2" id="direct-buy" style="justify-content:center;">直接开通（测试）</button>
  </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    let selectedPlan = 'quarterly';  // 默认选中季度

    // 点击"立即开通"按钮 → 选中套餐
    document.querySelectorAll('.select-plan').forEach(button => {
      button.addEventListener('click', function() {
        selectedPlan = this.getAttribute('data-plan');
        const name = this.getAttribute('data-name');
        const amount = this.getAttribute('data-amount');
        document.getElementById('selected-plan-text').textContent = name;
        document.getElementById('selected-price').textContent = '¥' + amount;

        // 高亮选中的套餐卡片
        document.querySelectorAll('.plan-card').forEach(card => card.classList.remove('featured'));
        this.closest('.plan-card').classList.add('featured');
      });
    });

    // 点击"确认支付" → 调用后端创建支付宝支付
    document.getElementById('confirm-payment').addEventListener('click', function() {
      createAlipayPayment(selectedPlan);
    });

    // 点击"直接开通" → 跳过支付宝，直接升级VIP
    document.getElementById('direct-buy').addEventListener('click', function() {
      const btn = this;
      btn.disabled = true;
      btn.innerHTML = '<i class="bi bi-arrow-repeat" style="animation:spin 1s linear infinite"></i> 处理中...';

      fetch('/payment/directBuy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'planType=' + encodeURIComponent(selectedPlan)
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          alert('VIP开通成功！');
          window.location.href = '/';
        } else {
          alert(data.msg);
        }
      })
      .catch(e => alert('请求失败: ' + e.message))
      .finally(() => { btn.disabled = false; btn.innerHTML = '直接开通（测试）'; });
    });
  });

  /**
   * 调用后端接口，创建支付宝支付，打开新窗口跳转到支付宝收银台
   */
  function createAlipayPayment(planType) {
    const btn = document.getElementById('confirm-payment');
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-arrow-repeat" style="animation:spin 1s linear infinite"></i> 正在跳转...';

    fetch('/payment/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'planType=' + encodeURIComponent(planType)
    })
    .then(response => {
      if (!response.ok) throw new Error('HTTP ' + response.status);
      return response.text();
    })
    .then(htmlContent => {
      // 支付宝返回的是一个自动提交的 HTML 表单，在新窗口中打开
      const paymentWindow = window.open('', '_blank');
      if (paymentWindow) {
        paymentWindow.document.write(htmlContent);
        paymentWindow.document.close();
      } else {
        alert('浏览器阻止了弹窗，请允许弹窗后重试');
      }
    })
    .catch(error => {
      alert('创建支付失败: ' + error.message);
    })
    .finally(() => {
      btn.disabled = false;
      btn.innerHTML = originalText;
    });
  }
</script>
</body>
</html>
