# LLM（阿里云百炼平台 - OpenAI 兼容接口）
# API Key 和 Base URL 由语言模型和 Embedding 模型共享
llm.base-url=${LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
llm.api-key=${LLM_API_KEY:}

# 语言模型（千问）
llm.chat.model-name=${LLM_CHAT_MODEL:qwen3.5-flash}

# Embedding 模型
llm.embedding.model-name=${LLM_EMBEDDING_MODEL:text-embedding-v4}