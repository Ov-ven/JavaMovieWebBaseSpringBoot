spring.application.name=Test7springboot-mybatis-plus-bookstore
mybatis-plus.configuration.logImpl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.mapUnderscoreToCamelCase=true 

#datasource config
#spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
#spring.datasource.url=jdbc:mysql://192.168.1.210/movie_db?useUnicode=true&useSSL=false&characterEncoding=UTF-8
#spring.datasource.username=root
#spring.datasource.password=135792468

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/movie_db?useUnicode=true&useSSL=false&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456

server.port=8080

#RocketMQ（未安装时注释掉以下两行，秒杀功能将不可用，但不影响其他功能）
rocketmq.name-server=127.0.0.1:9876
rocketmq.producer.group=seckill-producer-group

mybatis-plus.mapper-locations=classpath*:/mapper/*.xml
mybatis-plus.global-config.db-config.id-type=auto
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

# Redis??
spring.redis.host=127.0.0.1
spring.redis.port=6380
spring.redis.password=
spring.data.redis.database=0
spring.session.store-type=redis
spring.session.redis.namespace=spring:session
spring.session.redis.flush-mode=on_save
# server.reactive.session.cookie.domain=server.com
# session?????????????
server.servlet.session.timeout=30m
spring.session.timeout=30m

# alipay（从环境变量读取）
alipay.appId=${Alipay_AppId:}
alipay.appPrivateKey=${Alipay_AppPrivateKey:}
alipay.alipayPublicKey=${Alipay_AlipayPublicKey:}
alipay.notifyUrl=http://cf9a395e.natappfree.cc/payment/notify
alipay.gateway=https://openapi-sandbox.dl.alipaydev.com/gateway.do
alipay.returnUrl=http://localhost:8080/

# LLM (小米大模型 - OpenAI 兼容接口)
# 从环境变量读取，本地调试需在 IDEA Run/Debug Configuration 中配置
llm.xiaomi.base-url=${XIAOMI_BASE_URL:https://token-plan-cn.xiaomimimo.com/v1}
llm.xiaomi.api-key=${MIMO_API_KEY:}
llm.xiaomi.model-name=${XIAOMI_MODEL_NAME:mimo-v2.5-pro}

# Embedding 模型（阿里云 DashScope，API Key 从环境变量读取）
llm.embedding.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
llm.embedding.api-key=${Llm_Embedding_Apikey:}
llm.embedding.model-name=text-embedding-v4