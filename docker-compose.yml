version: '3.8'

services:
  # ========== MySQL ==========
  mysql:
    image: mysql:8.0.28
    container_name: movie-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: '123456'
      MYSQL_DATABASE: movie_db
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_general_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/movie.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== Redis Stack（含 RediSearch） ==========
  redis:
    image: redis/redis-stack:latest
    container_name: movie-redis
    restart: always
    ports:
      - "16380:6379"
      - "18001:8001"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== 应用服务 ==========
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movie-app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/movie_db?useUnicode=true&useSSL=false&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: '123456'
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: '6379'
      MIMO_API_KEY: ${MIMO_API_KEY}
      Llm_Embedding_Apikey: ${Llm_Embedding_Apikey}
      Alipay_AppId: ${Alipay_AppId}
      Alipay_AppPrivateKey: ${Alipay_AppPrivateKey}
      Alipay_AlipayPublicKey: ${Alipay_AlipayPublicKey}

volumes:
  mysql-data:
  redis-data:
