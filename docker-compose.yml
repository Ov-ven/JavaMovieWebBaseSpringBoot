services:
  # ========== MySQL ==========
  mysql:
    image: mysql:8.0.28
    container_name: movie-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: '123456'
      MYSQL_DATABASE: movie_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/movie.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== Redis Stack ==========
  redis:
    image: redis/redis-stack:latest
    container_name: movie-redis
    restart: always
    ports:
      - "6380:6379"
      - "8001:8001"  # RedisInsight UI
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== RocketMQ NameServer ==========
  namesrv:
    image: apache/rocketmq:5.1.4
    container_name: movie-namesrv
    restart: always
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx256m"

  # ========== RocketMQ Broker ==========
  broker:
    image: apache/rocketmq:5.1.4
    container_name: movie-broker
    restart: always
    ports:
      - "10911:10911"
    depends_on:
      - namesrv
    command: sh mqbroker -n namesrv:9876
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx256m"

  # ========== RocketMQ Dashboard ==========
  dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: movie-dashboard
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - namesrv
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=namesrv:9876"

volumes:
  mysql-data:
  redis-data:
